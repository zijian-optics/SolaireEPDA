- id: math_001
  type: choice
  content: "已知复数 $z=1+i$，则 $|z|$ 等于"
  options:
    A: "$1$"
    B: "$\\sqrt{2}$"
    C: "$2$"
    D: "$\\sqrt{3}$"
  answer: "B"
  analysis: "$|1+i|=\\sqrt{1^2+1^2}=\\sqrt{2}$。"

- id: math_002
  type: choice
  content: "函数 $f(x)=x^2-4x+3$ 的最小值为"
  options:
    A: "$-1$"
    B: "$0$"
    C: "$1$"
    D: "$-2$"
  answer: "A"
  analysis: "$f(x)=(x-2)^2-1$，最小值为 $-1$。"

