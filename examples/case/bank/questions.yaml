# ========================
# 计算 / 证明题（5题）
# ========================

- id: math_017
  type: reasoning
  content: "已知函数 $f(x)=x^2-3x+2$。\n(1) 求函数的零点；\n(2) 求其在区间 $[0,3]$ 上的最小值。"
  answer: |
    (1) 解方程 $x^2-3x+2=0$，即 $(x-1)(x-2)=0$，故 $x=1$ 或 $x=2$。
    (2) $f(x)=(x-\\frac{3}{2})^2-\\frac{1}{4}$，在 $[0,3]$ 上最小值为 $-\\frac{1}{4}$。
  analysis: "通过因式分解和配方法求解。"

- id: math_018
  type: reasoning
  content: "已知等差数列 $a_n$ 满足 $a_1=3,d=2$。\n(1) 求通项公式；\n(2) 求前10项和。"
  answer: |
    (1) $a_n=3+(n-1)\\cdot 2=2n+1$。
    (2) $a_{10}=21$，$S_{10}=\\dfrac{10}{2}(a_1+a_{10})=120$。
  analysis: "使用等差数列通项公式与求和公式。"

- id: math_019
  type: reasoning
  content: "求函数 $f(x)=x^3-3x$ 的极值。"
  answer: |
    $f'(x)=3x^2-3$，令 $f'(x)=0$ 得 $x=\\pm 1$。
    $f(1)=-2$ 为极小值，$f(-1)=2$ 为极大值。
  analysis: "利用导数判定极值。"

- id: math_020
  type: reasoning
  content: "证明：对任意实数 $a,b$，有\n$(a-b)^2 \\ge 0$。"
  answer: |
    $(a-b)^2\\ge 0$。展开得 $a^2-2ab+b^2\\ge 0$，故命题成立。
  analysis: "平方恒非负。"

- id: math_021
  type: reasoning
  content: "求定积分 $\\int_0^1 2x\\,dx$。"
  answer: |
    $\\displaystyle\\int_0^1 2x\\,dx = \\bigl[x^2\\bigr]_0^1 = 1$。
  analysis: "基本积分公式。"