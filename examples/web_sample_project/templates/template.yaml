template_id: 高考数学
layout: single_column
latex_base: exam-zh-base.tex.j2
sections:
  - section_id: 一. 选择题
    type: choice
    required_count: 2
    score_per_item: 5
    describe: 共12题，每题5分
  - section_id: 二.填空题
    type: fill
    required_count: 1
    score_per_item: 5
    describe: 共4题，每题5分
  - section_id: 三. 计算题
    type: reasoning
    required_count: 1
    score_per_item: 12
    describe: 共5题，每题12分
# 与 exam.yaml 的 metadata 同形；组卷时试卷 metadata 覆盖此处。亦可旁置 defaults.yaml 作为更底层默认。
