id: demo_context_choice
type: group
unified: choice
material: |
  **【题组示例 · 阅读材料】**

  设函数 $f(x)=x^2-1$，$x\in\mathbb{R}$。请根据材料回答下列小题。
items:
  - content: $f(0)$ 的值等于
    options:
      A: $-1$
      B: $0$
      C: $1$
      D: $2$
    answer: A
    analysis: $f(0)=0-1=-1$。
    metadata: {}
  - content: $f(2)$ 的值等于
    options:
      A: $1$
      B: $3$
      C: $5$
      D: $7$
    answer: B
    analysis: $f(2)=4-1=3$。
    metadata: {}
