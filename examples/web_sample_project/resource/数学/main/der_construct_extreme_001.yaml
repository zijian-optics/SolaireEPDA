id: der_construct_extreme_001
type: reasoning
content: |-
  已知函数 $f(x) = e^x - ax^2 - bx - c$，其中 $a, b, c$ 为实数。

  (1) 当 $a = 1, b = 0, c = 0$ 时，求 $f(x)$ 的极值；

  (2) 若 $f(x)$ 在 $x = 0$ 处取得极小值，且 $f(0) = 1$，试构造一个满足条件的函数 $g(x)$，使得 $g(x) = f(x) - 1$ 在 $x = 0$ 处有零点，并证明 $g(x)$ 在 $x = 0$ 附近单调递增。
answer: |-
  (1) 当 $a = 1, b = 0, c = 0$ 时，$f(x) = e^x - x^2$。
  求导得 $f'(x) = e^x - 2x$。
  令 $f'(x) = 0$，即 $e^x = 2x$。
  设 $h(x) = e^x - 2x$，则 $h'(x) = e^x - 2$。
  当 $x < \ln 2$ 时，$h'(x) < 0$；当 $x > \ln 2$ 时，$h'(x) > 0$。
  所以 $h(x)$ 在 $x = \ln 2$ 处取得最小值 $h(\ln 2) = 2 - 2\ln 2 > 0$。
  因此 $f'(x) = h(x) > 0$ 恒成立，$f(x)$ 在 $\mathbb{R}$ 上单调递增，**无极值**。

  (2) 由 $f(0) = 1$ 得 $c = 0$。
  $f'(x) = e^x - 2ax - b$，由 $f'(0) = 0$ 得 $b = 1$。
  构造 $g(x) = f(x) - 1 = e^x - ax^2 - x - 1$。
  则 $g(0) = 0$，且 $g'(x) = e^x - 2ax - 1$，$g'(0) = 0$。
  $g''(x) = e^x - 2a$，要使 $x = 0$ 为极小值点，需 $g''(0) > 0$，即 $a < \frac{1}{2}$。
  取 $a = 0$，则 $g(x) = e^x - x - 1$，$g'(x) = e^x - 1$。
  当 $x < 0$ 时，$g'(x) < 0$；当 $x > 0$ 时，$g'(x) > 0$。
  所以 $g(x)$ 在 $x = 0$ 附近单调递增（在 $(0, +\infty)$ 上单调递增）。
analysis: |-
  本题综合考查导数的应用。

  第(1)问通过求导分析函数单调性，发现导函数恒正，故原函数无极值点。这提醒学生求极值时必须先判断导函数是否有变号零点。

  第(2)问要求构造满足条件的函数，核心是利用极值点的必要条件（一阶导为零）和充分条件（二阶导为正）。通过构造 $g(x) = f(x) - 1$，将问题转化为证明函数在零点附近的单调性，体现了构造函数的思想方法。
metadata:
  难度: 中等偏上
  核心考点:
  - 构造函数求导
  - 利用导数判断单调性
  - 极值点的判定与求解
  题型: 解答题
