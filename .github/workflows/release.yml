# 在推送 v* 标签时于 Windows 上构建安装包（需完整工具链；首次运行可能较慢）
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            package-lock.json

      - name: Install Python package + Nuitka deps
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,primebrush-pdf]"
          pip install nuitka ordered-set zstandard

      - name: Frontend build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Nuitka — solaire-server.exe
        shell: pwsh
        run: |
          .\scripts\nuitka-solaire.ps1

      - name: Install root deps (Tauri CLI)
        run: npm ci

      - name: Tauri build (MSI)
        run: npm run tauri:build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: soledu-windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
