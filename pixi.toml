[workspace]
name = "soledu-build"
description = "SolEdu desktop build toolchain managed by pixi"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[activation.env]
PYTHONNOUSERSITE = "1"
PYTHONUNBUFFERED = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

[dependencies]
python = "3.12.*"
pip = "*"
nodejs = "20.*"
rust = "*"
maturin = "*"

[tasks]
# ── 依赖安装（子任务）────────────────────────────────────
install-python = "python -m pip install --upgrade pip setuptools wheel && python -m pip install -e ."
install-node-root = "npm install --userconfig .npmrc.pixi"
install-node-web = { cmd = "npm ci --userconfig ../.npmrc.pixi", cwd = "web" }

# ── 初始化（首次运行一次）────────────────────────────────
bootstrap = { depends-on = ["install-python", "install-node-root", "install-node-web"] }

# ── 清理构建产物 ─────────────────────────────────────────
clean = 'powershell -NoProfile -Command "Remove-Item -Recurse -Force -ErrorAction SilentlyContinue web/dist, src-tauri/target/release/bundle; Write-Host [clean] Done."'

# ── 构建前端 ─────────────────────────────────────────────
build = { cmd = "npm run build", cwd = "web" }

# ── 开发（一键启动后端 + 前端 + Tauri）───────────────────
dev = "npm run tauri:dev"
dev-backend = "python -m uvicorn solaire.web.app:app --app-dir src --host 127.0.0.1 --port 8000 --reload --reload-dir src"
dev-frontend = { cmd = "npm run dev -- --host localhost --port 5173 --strictPort", cwd = "web" }

# ── 测试 & 类型检查 ──────────────────────────────────────
test = "python -m pytest tests"
test-web = { cmd = "npm test", cwd = "web" }
typecheck = { cmd = "npx tsc --noEmit", cwd = "web" }

# ── 桌面端发布构建 ───────────────────────────────────────
build-desktop = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1"

[pypi-dependencies]
anyio = ">=4.13.0, <5"
anthropic = ">=0.97.0, <0.98"
trafilatura = ">=1.12"
lxml = ">=5.0"
tokenizers = ">=0.20.0, <1"
# PrimeBrush 插图导出 PDF/LaTeX 时 SVG→PNG（与 pyproject 可选依赖 primebrush-pdf 对齐）
cairosvg = ">=2.7"
