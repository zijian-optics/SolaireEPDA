[workspace]
name = "soledu-build"
description = "SolEdu desktop build toolchain managed by pixi"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

[activation.env]
PYTHONNOUSERSITE = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

[dependencies]
python = "3.12.*"
pip = "*"
nodejs = "20.*"
rust = "*"
maturin = "*"

[tasks]
# 内部子任务（bootstrap 的依赖，用户不直接调用）
install-python = "python -m pip install --upgrade pip setuptools wheel && python -m pip install -e ."
install-node-root = "npm install --userconfig .npmrc.pixi"
install-node-web = { cmd = "npm ci --userconfig ../.npmrc.pixi", cwd = "web" }

# 首次初始化（运行一次即可）
bootstrap = { depends-on = ["install-python", "install-node-root", "install-node-web"] }

# 主任务
dev = "npm run tauri:dev"
build-desktop = "powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build.ps1"
